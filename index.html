<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>임산부 혜택 완전정복 2026</title>
  <style>
    :root {
      --pink: #F06292;
      --pink-light: #FCE4EC;
      --pink-dark: #C2185B;
      --bg: #FFF8FA;
      --card-bg: #FFFFFF;
      --text: #2C2C2C;
      --text-light: #888;
      --border: #F8BBD0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, #EC407A 0%, #F48FB1 60%, #FFB3C6 100%);
      color: white;
      padding: 28px 20px 24px;
      text-align: center;
    }
    header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
    header p { font-size: 12px; opacity: 0.88; }
    .badge-row { display: flex; gap: 8px; justify-content: center; margin-top: 12px; }
    .badge {
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 600;
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      padding: 14px 16px;
      overflow-x: auto;
      background: white;
      border-bottom: 1px solid var(--border);
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-btn {
      padding: 7px 16px;
      border-radius: 20px;
      border: 1.5px solid #eee;
      background: white;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      font-family: inherit;
      color: #555;
    }
    .filter-btn:hover { border-color: var(--pink); color: var(--pink); }
    .filter-btn.active { background: var(--pink); color: white; border-color: var(--pink); font-weight: 700; }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 12px;
      padding: 16px;
      max-width: 960px;
      margin: 0 auto;
    }

    /* ── CARD ── */
    .card {
      background: var(--card-bg);
      border-radius: 18px;
      padding: 18px 14px 14px;
      cursor: pointer;
      border: 1.5px solid var(--border);
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
      position: relative;
      user-select: none;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(240, 98, 146, 0.18);
      border-color: var(--pink);
    }
    .card:active { transform: scale(0.97); }
    .card-num {
      font-size: 10px;
      font-weight: 800;
      color: var(--pink);
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .card-icon { font-size: 30px; margin-bottom: 8px; line-height: 1; }
    .card-title { font-size: 14px; font-weight: 700; line-height: 1.35; margin-bottom: 6px; }
    .card-short { font-size: 11px; color: var(--text-light); line-height: 1.45; }
    .cat-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 10px;
      margin-top: 10px;
    }
    /* category colors */
    .cat-medical   .cat-tag { background: #FCE4EC; color: #C2185B; }
    .cat-financial .cat-tag { background: #E8F5E9; color: #2E7D32; }
    .cat-service   .cat-tag { background: #E8EAF6; color: #3949AB; }
    .cat-transport .cat-tag { background: #FFF3E0; color: #E65100; }
    .cat-misc      .cat-tag { background: #F3E5F5; color: #6A1B9A; }

    /* category colors */
    .cat-community .cat-tag { background: #E0F2F1; color: #00695C; }
    .cat-youtube   .cat-tag { background: #EDE7F6; color: #5E35B1; }

    /* left border accent */
    .cat-medical   { border-left: 3px solid #F06292; }
    .cat-financial { border-left: 3px solid #66BB6A; }
    .cat-service   { border-left: 3px solid #7986CB; }
    .cat-transport { border-left: 3px solid #FFA726; }
    .cat-misc      { border-left: 3px solid #BA68C8; }
    .cat-community { border-left: 3px solid #26A69A; }
    .cat-youtube   { border-left: 3px solid #7E57C2; }

    /* community card hover */
    .cat-community:hover { box-shadow: 0 10px 28px rgba(38, 166, 154, 0.18); border-color: #26A69A; }
    .cat-community .card-num { color: #26A69A; }
    .cat-youtube:hover { box-shadow: 0 10px 28px rgba(126,87,194,0.18); border-color: #7E57C2; }
    .cat-youtube .card-num { color: #7E57C2; }

    /* ── MODAL OVERLAY ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
      backdrop-filter: blur(2px);
    }
    .overlay.open { display: flex; }

    /* ── MODAL SHEET ── */
    .sheet {
      background: white;
      border-radius: 26px 26px 0 0;
      width: 100%;
      max-width: 640px;
      max-height: 88vh;
      overflow-y: auto;
      animation: slideUp 0.28s cubic-bezier(.32,.72,0,1);
    }
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0.5; }
      to   { transform: translateY(0);    opacity: 1;   }
    }
    .sheet-handle-row {
      display: flex;
      justify-content: center;
      padding: 12px 0 0;
    }
    .sheet-handle {
      width: 38px; height: 4px;
      background: #ddd;
      border-radius: 2px;
    }

    .sheet-header {
      padding: 14px 20px 16px;
      border-bottom: 1px solid #F8BBD0;
      position: sticky;
      top: 0;
      background: white;
      z-index: 1;
    }
    .sheet-header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .sheet-meta { font-size: 11px; font-weight: 800; color: var(--pink); letter-spacing: 0.5px; margin-bottom: 6px; }
    .sheet-title-row { display: flex; align-items: center; gap: 10px; }
    .sheet-icon { font-size: 34px; line-height: 1; }
    .sheet-title { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .close-btn {
      width: 30px; height: 30px;
      border: none; border-radius: 50%;
      background: #f0f0f0;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #666; flex-shrink: 0;
      transition: background 0.15s;
    }
    .close-btn:hover { background: #e0e0e0; }

    /* ── MODAL BODY ── */
    .sheet-body { padding: 20px; }
    .section { margin-bottom: 20px; }
    .sec-label {
      font-size: 11px;
      font-weight: 800;
      color: var(--pink);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .sec-label::before {
      content: '';
      display: inline-block;
      width: 3px; height: 13px;
      background: var(--pink);
      border-radius: 2px;
    }
    .sec-content { font-size: 14px; line-height: 1.75; color: #333; }
    .sec-list { list-style: none; padding: 0; }
    .sec-list li {
      padding: 5px 0 5px 18px;
      position: relative;
      font-size: 14px;
      line-height: 1.55;
      color: #333;
      border-bottom: 1px solid #f5f5f5;
    }
    .sec-list li:last-child { border-bottom: none; }
    .sec-list li::before {
      content: '→';
      position: absolute; left: 0;
      color: var(--pink); font-weight: 700;
      font-size: 12px; top: 6px;
    }
    .amount-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #EC407A, #F48FB1);
      color: white;
      padding: 10px 20px;
      border-radius: 14px;
      font-weight: 800;
      font-size: 16px;
    }
    .tip-box {
      background: #FFF8FA;
      border: 1.5px solid #F8BBD0;
      border-left: 4px solid var(--pink);
      border-radius: 0 12px 12px 0;
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.65;
      color: #444;
    }
    .tip-box strong { color: var(--pink); }
    .warn-box {
      background: #FFFDE7;
      border: 1.5px solid #FDD835;
      border-left: 4px solid #F9A825;
      border-radius: 0 12px 12px 0;
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.65;
      color: #555;
    }

    /* ── FOOTER ── */
    /* community section divider in grid */
    .community-divider {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0 4px;
    }
    .community-divider span {
      font-size: 12px;
      font-weight: 800;
      color: #26A69A;
      white-space: nowrap;
    }
    .community-divider::before, .community-divider::after {
      content: '';
      flex: 1;
      height: 1.5px;
      background: linear-gradient(to right, #B2DFDB, transparent);
    }
    .community-divider::before { background: linear-gradient(to right, transparent, #B2DFDB); }

    footer {
      text-align: center;
      padding: 24px 20px;
      font-size: 11px;
      color: #bbb;
      line-height: 1.8;
    }
    footer a { color: #F06292; text-decoration: none; }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #ccc;
      font-size: 14px;
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }

    /* ── SEARCH ── */
    .search-wrap {
      padding: 0 16px 10px;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 11px 40px 11px 16px;
      border: 1.5px solid var(--border);
      border-radius: 24px;
      font-size: 13px;
      font-family: inherit;
      background: white;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(240,98,146,0.1);
    }
    .search-input::placeholder { color: #ccc; }
    .search-clear {
      position: absolute;
      right: 28px;
      top: 50%;
      transform: translateY(-50%);
      background: #eee;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 12px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .search-meta {
      font-size: 11px;
      color: var(--text-light);
      padding: 2px 18px 8px;
      display: none;
    }
    .search-highlight {
      background: #FFF3CD;
      border-radius: 2px;
      font-weight: 700;
    }

    /* ── TAB NAV ── */
    .tab-nav {
      display: flex;
      background: white;
      border-bottom: 2.5px solid var(--pink-light);
      position: sticky;
      top: 0;
      z-index: 20;
      box-shadow: 0 2px 10px rgba(240,98,146,0.08);
    }
    .tab-btn {
      flex: 1;
      padding: 15px 4px 13px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      color: #c0c0c0;
      border-bottom: 3px solid transparent;
      margin-bottom: -2.5px;
      transition: all 0.18s;
      letter-spacing: -0.4px;
      line-height: 1.4;
      font-family: inherit;
    }
    .tab-btn .tab-icon { font-size: 16px; display: block; margin-bottom: 2px; }
    .tab-btn.active { color: var(--pink); border-bottom-color: var(--pink); }
    .tab-btn:hover:not(.active) { color: #F48FB1; }

    /* ── WEEKLY VIEW ── */
    #weeklyView { display: none; padding: 4px 16px 24px; }
    .trimester-title {
      font-size: 13px;
      font-weight: 800;
      color: white;
      background: linear-gradient(135deg, #EC407A 0%, #F48FB1 100%);
      padding: 9px 16px;
      border-radius: 12px;
      margin: 16px 0 8px;
      letter-spacing: -0.3px;
    }
    .week-item {
      background: white;
      border-radius: 14px;
      margin-bottom: 8px;
      border: 1.5px solid var(--border);
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow 0.2s;
    }
    .week-item:hover { box-shadow: 0 4px 16px rgba(240,98,146,0.12); }
    .week-header {
      display: flex;
      align-items: center;
      padding: 13px 14px;
      gap: 10px;
      user-select: none;
    }
    .week-num {
      background: var(--pink-light);
      color: var(--pink-dark);
      font-weight: 800;
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .week-title { font-weight: 700; font-size: 13px; flex: 1; }
    .week-arrow { color: var(--text-light); font-size: 11px; transition: transform 0.2s; flex-shrink: 0; }
    .week-item.open .week-arrow { transform: rotate(90deg); }
    .week-body { display: none; padding: 0 14px 13px; border-top: 1px solid var(--pink-light); }
    .week-item.open .week-body { display: block; }
    .week-task {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 7px 0;
      font-size: 12.5px;
      border-bottom: 1px solid #FFF0F5;
      line-height: 1.5;
    }
    .week-task:last-child { border-bottom: none; }
    .week-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--pink); margin-top: 5px; flex-shrink: 0; }
    .week-dot.urgent { background: #EF5350; }
    .week-tag {
      display: inline-block;
      font-size: 10px;
      padding: 1px 7px;
      border-radius: 8px;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 3px;
    }
    .week-tag.must { background: #FFE0E0; color: #C62828; }
    .week-tag.free { background: #E8F5E9; color: #2E7D32; }
    .week-tag.tip  { background: #E0F2F1; color: #00695C; }
    .week-legend {
      display: flex;
      gap: 10px;
      padding: 8px 0 4px;
      font-size: 11px;
      flex-wrap: wrap;
    }
    .week-legend span { display: flex; align-items: center; gap: 4px; }
  </style>
</head>

<div class="overlay" id="overlay">

// ── render grid (공식 혜택만) ─────────────────────────────
function renderGrid(cat) {
  const grid = document.getElementById('grid');
  const official = data.filter(d => d.cat !== 'community');
  const items = cat === 'all' ? official : official.filter(d => d.cat === cat);
  if (!items.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div>해당 항목이 없습니다.</div>';
    return;
  }
  grid.innerHTML = items.map(d => `
    <div class="card cat-${d.cat}" onclick="openModal('${d.id}')" role="button" tabindex="0" aria-label="${d.title} 상세보기">
      <div class="card-num">혜택 No.${d.id}</div>
      <div class="card-icon">${d.icon}</div>
      <div class="card-title">${d.title}</div>
      <div class="card-short">${d.short}</div>
      <span class="cat-tag">${d.catLabel}</span>
    </div>`).join('');
  grid.querySelectorAll('.card').forEach(c => {
    c.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') c.click(); });
  });
}

// ── search ───────────────────────────────────────────────
function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return text.replace(re, '<mark class="search-highlight">$1</mark>');
}

function searchData(q) {
  const lq = q.toLowerCase();
  return [...data, ...youtubeData].filter(d => {
    const hay = [
      d.title, d.short, d.catLabel,
      ...d.sections.flatMap(s => [s.label||'', s.text||'', s.tip||'', s.warn||'', ...(s.list||[])])
    ];
    return hay.some(f => f.toLowerCase().includes(lq));
  });
}

function clearSearch() {
  searchInput.value = '';
  searchClear.style.display = 'none';
  searchMeta.style.display = 'none';
}

function renderSearchResults(items, q) {
  const grid = document.getElementById('grid');
  if (!items.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div>검색 결과가 없어요</div>';
    return;
  }
  grid.innerHTML = items.map(d => {
    const numLabel = d.id.startsWith('Y') ? `유투버 지식 ${d.id}` : d.id.startsWith('C') ? `커뮤니티 팁 ${d.id}` : `혜택 No.${d.id}`;
    return `
      <div class="card cat-${d.cat}" onclick="openModal('${d.id}')" role="button" tabindex="0">
        <div class="card-num">${numLabel}</div>
        <div class="card-icon">${d.icon}</div>
        <div class="card-title">${highlight(d.title, q)}</div>
        <div class="card-short">${highlight(d.short, q)}</div>
        <span class="cat-tag">${d.catLabel}</span>
      </div>`;
  }).join('');
  grid.querySelectorAll('.card').forEach(c => {
    c.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') c.click(); });
  });
}

const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
const searchMeta  = document.getElementById('searchMeta');

searchInput.addEventListener('input', function() {
  const q = this.value.trim();
  searchClear.style.display = q ? 'flex' : 'none';
  if (q) {
    switchTab('benefit');
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    const results = searchData(q);
    searchMeta.style.display = 'block';
    searchMeta.textContent = `"${q}" 검색 결과 ${results.length}건`;
    renderSearchResults(results, q);
  } else {
    searchMeta.style.display = 'none';
    document.querySelector('.filter-btn[data-cat="all"]').classList.add('active');
    renderGrid('all');
  }
});

searchClear.addEventListener('click', () => {
  clearSearch();
  document.querySelector('.filter-btn[data-cat="all"]').classList.add('active');
  renderGrid('all');
  searchInput.focus();
});

// ── modal ────────────────────────────────────────────────
function openModal(id) {
  const d = data.find(x => x.id === id) || youtubeData.find(x => x.id === id);
  if (!d) return;

  const metaPrefix = d.id.startsWith('Y') ? '유투버 지식' : d.id.startsWith('C') ? '커뮤니티 꿀팁' : '혜택 No.' + d.id;
  document.getElementById('modalMeta').textContent = (d.id.startsWith('Y') || d.id.startsWith('C')) ? d.catLabel : ('혜택 No.' + d.id + ' · ' + d.catLabel);
  document.getElementById('modalIcon').textContent = d.icon;
  document.getElementById('modalTitle').textContent = d.title;

  const body = document.getElementById('modalBody');
  body.innerHTML = d.sections.map(s => {
    let inner = '';
    if (s.amount) {
      inner = `<div class="amount-chip">💵 ${s.amount}</div>`;
    } else if (s.tip) {
      inner = `<div class="tip-box">💡 ${s.tip.replace(/\n/g,'<br>')}</div>`;
    } else if (s.warn) {
      inner = `<div class="warn-box">⚠️ ${s.warn}</div>`;
    } else if (s.list) {
      inner = `<ul class="sec-list">${s.list.map(li => `<li>${li}</li>`).join('')}</ul>`;
    } else {
      inner = `<div class="sec-content">${(s.text||'').replace(/\n/g,'<br>')}</div>`;
    }
    return `<div class="section"><div class="sec-label">${s.label}</div>${inner}</div>`;
  }).join('');

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});
document.getElementById('closeBtn').addEventListener('click', closeModal);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── render weekly ─────────────────────────────────────────
function renderWeekly() {
  const view = document.getElementById('weeklyView');
  const legendHtml = `
    <div class="week-legend">
      <span><span class="week-tag must">필수</span> 꼭 해야 할 것</span>
      <span><span class="week-tag free">무료·지원</span> 챙길 수 있는 혜택</span>
      <span><span class="week-tag tip">꿀팁</span> 커뮤니티 추천</span>
    </div>`;
  view.innerHTML = legendHtml + weeklyData.map(tri => `
    <div class="trimester-title">${tri.trimester}</div>
    ${tri.weeks.map(w => `
      <div class="week-item" onclick="toggleWeek(this)">
        <div class="week-header">
          <span class="week-num">${w.range}</span>
          <span class="week-title">${w.title}</span>
          <span class="week-arrow">▶</span>
        </div>
        <div class="week-body">
          ${w.tasks.map(t => `
            <div class="week-task">
              <div class="week-dot${t.tag==='must'?' urgent':''}"></div>
              <span>${t.text}</span>
              <span class="week-tag ${t.tag}">${t.tag==='must'?'필수':t.tag==='free'?'무료·지원':'꿀팁'}</span>
            </div>`).join('')}
        </div>
      </div>`).join('')}
  `).join('');
}

function toggleWeek(el) {
  el.classList.toggle('open');
}

// ── tab switching ─────────────────────────────────────────
function switchTab(tab) {
  // 뷰 숨김
  document.getElementById('cardView').style.display      = 'none';
  document.getElementById('weeklyView').style.display    = 'none';
  document.getElementById('communityView').style.display = 'none';
  document.getElementById('youtubeView').style.display   = 'none';
  // 탭 비활성화
  ['tabBenefit','tabWeekly','tabCommunity','tabYoutube'].forEach(id =>
    document.getElementById(id).classList.remove('active'));

  if (tab === 'benefit') {
    document.getElementById('cardView').style.display = 'block';
    document.getElementById('tabBenefit').classList.add('active');
  } else if (tab === 'weekly') {
    document.getElementById('weeklyView').style.display = 'block';
    document.getElementById('tabWeekly').classList.add('active');
    if (!document.getElementById('weeklyView').innerHTML.trim()) renderWeekly();
  } else if (tab === 'community') {
    document.getElementById('communityView').style.display = 'block';
    document.getElementById('tabCommunity').classList.add('active');
    if (!document.getElementById('communityView').innerHTML.trim()) renderCommunity();
  } else if (tab === 'youtube') {
    document.getElementById('youtubeView').style.display = 'block';
    document.getElementById('tabYoutube').classList.add('active');
    if (!document.getElementById('youtubeView').innerHTML.trim()) renderYoutube();
  }
}

document.getElementById('tabBenefit').addEventListener('click', () => { clearSearch(); switchTab('benefit'); document.querySelector('.filter-btn[data-cat="all"]').classList.add('active'); renderGrid('all'); });
document.getElementById('tabWeekly').addEventListener('click',  () => { clearSearch(); switchTab('weekly'); });
document.getElementById('tabCommunity').addEventListener('click',() => { clearSearch(); switchTab('community'); });
document.getElementById('tabYoutube').addEventListener('click', () => { clearSearch(); switchTab('youtube'); });

// ── init ─────────────────────────────────────────────────
switchTab('benefit');
renderGrid('all');
document.querySelector('.filter-btn[data-cat="all"]').classList.add('active');
</script>
